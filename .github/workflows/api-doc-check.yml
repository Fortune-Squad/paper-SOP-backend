name: API Doc Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-api-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate API docs against routes
        run: python scripts/check_api_docs.py
